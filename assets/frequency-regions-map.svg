<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" role="img" aria-labelledby="frequencyRegionsMapTitle frequencyRegionsMapDesc">
  <title id="frequencyRegionsMapTitle">Frequency regions schematic map</title>
  <desc id="frequencyRegionsMapDesc">Interactive schematic map of selected European 50 Hz synchronous frequency regions.</desc>
  <defs>
    <linearGradient id="ceRegionGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="softRegionShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0B1220" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="760" height="500" rx="28" fill="#F8FAFC"/>
  <g opacity="0.38" stroke="#CBD5E1" stroke-width="1">
    <path d="M50 95H710"/>
    <path d="M50 180H710"/>
    <path d="M50 265H710"/>
    <path d="M50 350H710"/>
    <path d="M50 435H710"/>
    <path d="M125 48V455"/>
    <path d="M250 48V455"/>
    <path d="M375 48V455"/>
    <path d="M500 48V455"/>
    <path d="M625 48V455"/>
  </g>
  <g class="map-region map-region-muted" data-region-id="outside" aria-label="Other synchronized areas" opacity="0.5">
    <path d="M598 356c29 10 52 24 65 43 9 13 7 31-5 41-17 15-52 12-80-2-26-13-45-34-45-55 0-21 29-35 65-27Z" fill="#CBD5E1"/>
  </g>
  <g class="map-region" data-region-id="nordic" tabindex="0" aria-label="Nordic synchronous area" filter="url(#softRegionShadow)">
    <path d="M314 60c34-20 86-17 120 7 28 20 37 52 23 83-17 39-22 70-8 101 10 23 0 48-25 59-28 13-70 0-91-29-17-23-44-37-77-42-33-5-58-26-63-53-5-30 20-53 55-55 28-2 45-17 49-45 2-11 7-20 17-26Z" fill="#60A5FA"/>
  </g>
  <g class="map-region" data-region-id="great-britain" tabindex="0" aria-label="Great Britain synchronous area" filter="url(#softRegionShadow)">
    <path d="M184 209c24-22 58-19 76 4 16 20 9 48-14 65-17 12-22 34-10 51 12 18 3 41-18 48-23 8-51-8-61-35-7-19-23-32-42-38-22-7-36-26-31-47 4-18 22-28 42-25 23 4 42-5 58-23Z" fill="#64748B"/>
  </g>
  <g class="map-region" data-region-id="ireland" tabindex="0" aria-label="Ireland synchronous area" filter="url(#softRegionShadow)">
    <path d="M96 256c18-17 44-18 59-3 14 14 12 38-6 52-12 9-15 23-7 36 8 15-2 32-20 35-24 5-51-17-56-44-2-14-10-25-22-31-14-8-18-25-8-37 10-12 39 4 60-8Z" fill="#94A3B8"/>
  </g>
  <g class="map-region" data-region-id="continental-europe" tabindex="0" aria-label="Continental Europe synchronous area" filter="url(#softRegionShadow)">
    <path d="M302 196c30-20 81-17 122 2 29 14 61 13 92 0 50-20 105 3 123 49 16 39-5 83-45 95-27 9-45 31-51 61-7 35-40 55-76 46-31-8-49-33-48-66 1-30-16-48-44-51-35-4-58-30-55-62 2-27-11-45-38-53-15-5-14-14 20-21Z" fill="url(#ceRegionGradient)"/>
    <path data-country-code="TR" data-region-id="continental-europe" tabindex="0" aria-label="Türkiye frequency data from TEİAŞ" d="M506 348c25-12 62-8 86 9 19 14 22 36 8 51-17 18-58 22-88 8-26-12-38-37-24-55 5-6 11-10 18-13Z" fill="#0F766E" stroke="#F8FAFC" stroke-width="4"/>
    <g data-country-code="EE" data-region-id="continental-europe" aria-label="Estonia synchronized with Continental Europe" opacity="0.95">
      <circle cx="497" cy="183" r="9" fill="#F59E0B" stroke="#F8FAFC" stroke-width="3"/>
    </g>
    <g data-country-code="LV" data-region-id="continental-europe" aria-label="Latvia synchronized with Continental Europe" opacity="0.95">
      <circle cx="491" cy="204" r="9" fill="#F59E0B" stroke="#F8FAFC" stroke-width="3"/>
    </g>
    <g data-country-code="LT" data-region-id="continental-europe" aria-label="Lithuania synchronized with Continental Europe" opacity="0.95">
      <circle cx="485" cy="226" r="9" fill="#F59E0B" stroke="#F8FAFC" stroke-width="3"/>
    </g>
  </g>
  <g class="map-pulse" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M96 118c52 0 36 52 88 52s36-52 88-52 36 52 88 52 36-52 88-52 36 52 88 52 36-52 88-52" stroke="#0EA5E9" stroke-width="8" opacity="0.75"/>
    <circle cx="382" cy="144" r="10" fill="#F8FAFC" stroke="#0B1220" stroke-width="4"/>
