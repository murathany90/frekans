<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" role="img" aria-labelledby="frequencyRegionsMapTitle frequencyRegionsMapDesc" data-map-layout="png-silhouette-cards">
  <title id="frequencyRegionsMapTitle">Frequency regions silhouette cards</title>
  <desc id="frequencyRegionsMapDesc">Interactive card map of Great Britain, Continental Europe with Türkiye highlighted, and Nordic 50 Hz frequency regions.</desc>
  <defs>
    <linearGradient id="regionCardBackground" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3F9FD"/>
    </linearGradient>
    <filter id="regionCardShadow" x="-10%" y="-12%" width="120%" height="128%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0B1220" flood-opacity="0.12"/>
    </filter>
    <filter id="labelShadow" x="-20%" y="-50%" width="140%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.95"/>
    </filter>
    <filter id="turkiyeGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#EF4444" flood-opacity="0.55"/>
    </filter>
    <style>
      .map-bg { fill: #F8FAFC; }
      .region-card { outline: none; }
      .card-frame {
        fill: url(#regionCardBackground);
        stroke: #D5E4EE;
        stroke-width: 1.2;
        filter: url(#regionCardShadow);
      }
      .region-card:hover .card-frame,
      .region-card:focus .card-frame,
      .region-card.is-selected .card-frame {
        stroke: #22D3EE;
        stroke-width: 2.4;
      }
      .region-grid {
        stroke: #DBE9F1;
        stroke-width: 1;
        opacity: .76;
      }
      .region-shape {
        opacity: .94;
      }
      .region-shape-ce {
        opacity: .90;
      }
      .region-card:hover .region-shape,
      .region-card:focus .region-shape,
      .region-card.is-selected .region-shape {
        opacity: 1;
      }
      .region-label {
        fill: #0B2F55;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 22px;
        font-weight: 900;
        letter-spacing: 0;
        filter: url(#labelShadow);
      }
      .region-subtitle {
        fill: #556C80;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 10.5px;
        font-weight: 850;
        letter-spacing: .035em;
        filter: url(#labelShadow);
      }
      .country-marker { outline: none; }
      .turkiye-highlight {
        filter: url(#turkiyeGlow);
        stroke: #FFFFFF;
        stroke-width: 4;
      }
      .country-marker:hover .turkiye-highlight,
      .country-marker:focus .turkiye-highlight,
      .country-marker.is-selected .turkiye-highlight {
        stroke: #0B1220;
      }
      .country-label {
        fill: #FFFFFF;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 950;
        letter-spacing: .02em;
      }
      .baltic-marker {
        fill: #F59E0B;
        stroke: #FFFFFF;
        stroke-width: 3;
      }
    </style>
  </defs>

  <rect class="map-bg" x="0" y="0" width="960" height="340" rx="28"/>

  <g class="region-card" data-region-id="great-britain" tabindex="0" aria-label="Great Britain synchronous frequency area">
    <rect class="card-frame" x="24" y="34" width="280" height="276" rx="16"/>
    <g class="region-grid">
      <path d="M54 86H274"/>
      <path d="M54 152H274"/>
      <path d="M54 218H274"/>
      <path d="M108 64V282"/>
      <path d="M164 64V282"/>
      <path d="M220 64V282"/>
    </g>
    <image class="region-shape" href="assets/frequency-regions/gb-silhouette.png" x="91" y="58" width="146" height="192" preserveAspectRatio="xMidYMid meet"/>
    <text class="region-label" x="164" y="165" text-anchor="middle">Büyük Britanya</text>
    <text class="region-subtitle" x="164" y="185" text-anchor="middle">ISLANDED 50 HZ</text>
  </g>

  <g class="region-card" data-region-id="continental-europe" tabindex="0" aria-label="Continental Europe synchronous frequency area with Türkiye highlighted">
    <rect class="card-frame" x="340" y="34" width="280" height="276" rx="16"/>
    <g class="region-grid">
      <path d="M370 86H590"/>
      <path d="M370 152H590"/>
      <path d="M370 218H590"/>
      <path d="M424 64V282"/>
      <path d="M480 64V282"/>
      <path d="M536 64V282"/>
    </g>
    <image class="region-shape region-shape-ce" href="assets/frequency-regions/ce-silhouette.png" x="354" y="92" width="252" height="158" preserveAspectRatio="xMidYMid meet"/>
    <text class="region-label" x="480" y="165" text-anchor="middle">Kıta Avrupası</text>
    <text class="region-subtitle" x="480" y="185" text-anchor="middle">SYNCHRONOUS 50 HZ</text>
    <g class="country-marker" data-country-code="TR" tabindex="0" aria-label="Türkiye TEİAŞ frequency data marker">
      <ellipse class="turkiye-highlight" cx="546" cy="224" rx="25" ry="14" fill="#EF4444"/>
      <text class="country-label" x="546" y="228" text-anchor="middle">TR</text>
    </g>
    <g data-country-code="EE" tabindex="0" aria-label="Estonia synchronized with Continental Europe">
      <circle class="baltic-marker" cx="518" cy="104" r="7"/>
    </g>
    <g data-country-code="LV" tabindex="0" aria-label="Latvia synchronized with Continental Europe">
      <circle class="baltic-marker" cx="513" cy="121" r="7"/>
    </g>
    <g data-country-code="LT" tabindex="0" aria-label="Lithuania synchronized with Continental Europe">
      <circle class="baltic-marker" cx="507" cy="138" r="7"/>
    </g>
  </g>

  <g class="region-card" data-region-id="nordic" tabindex="0" aria-label="Nordic synchronous frequency area">
    <rect class="card-frame" x="656" y="34" width="280" height="276" rx="16"/>
    <g class="region-grid">
      <path d="M686 86H906"/>
      <path d="M686 152H906"/>
      <path d="M686 218H906"/>
      <path d="M740 64V282"/>
      <path d="M796 64V282"/>
      <path d="M852 64V282"/>
    </g>
    <image class="region-shape" href="assets/frequency-regions/nordic-silhouette.png" x="720" y="54" width="154" height="204" preserveAspectRatio="xMidYMid meet"/>
    <text class="region-label" x="796" y="165" text-anchor="middle">Nordik</text>
    <text class="region-subtitle" x="796" y="185" text-anchor="middle">SYNCHRONOUS 50 HZ</text>
  </g>
</svg>
