name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frekans_rapor_v1.html"
      - "index.html"
      - "assets/**"
      - "data/**"
      - "CNAME"
      - "LICENSE"
      - "robots.txt"
      - "sitemap.xml"
      - "404.html"
      - "site.webmanifest"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/deploy_pages.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["TEIAS Daily Frequency Update", "Netztransparenz Daily Frequency Update"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Test
        run: |
          python -m pytest tests
          node tests/frontend_static_smoke.mjs
          node tests/frontend_prompt2_static.mjs
          node tests/frontend_prompt3_static.mjs
          node tests/frontend_prompt4_static.mjs
          node tests/frontend_prompt5_static.mjs
          node tests/frontend_prompt6_static.mjs
          node tests/frontend_brand_static.mjs
          node tests/frontend_public_sharing_static.mjs
          node tests/frontend_source_labels_static.mjs
          node tests/frontend_data_sources_modal_static.mjs
          node tests/readme_documentation_static.mjs
          node tests/synthetic_signal_analysis.mjs
          node tests/spectral_methods.mjs

      - name: Build static site
        run: python scripts/build_site.py

      - name: Validate dist safety
        run: |
          python - <<'PY'
          from scripts.backfill_2025_2026 import assert_publishable_dist
          print(assert_publishable_dist("dist"))
          PY

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
