name: Backfill TEIAS 2026

on:
  workflow_dispatch:
    inputs:
      request_delay:
        description: "Seconds between TEIAS requests"
        default: "0.25"
        required: true

concurrency:
  group: teias-frequency-backfill-2026
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Run 2026 backfill
        run: python scripts/backfill_2026.py --source teias --request-delay "${{ inputs.request_delay }}"

      - name: Validate
        run: |
          python scripts/validate_frequency.py
          python -m pytest tests
          node tests/frontend_static_smoke.mjs
          node tests/frontend_prompt5_static.mjs

      - name: Commit backfill output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports
          if git diff --cached --quiet; then
            echo "No backfill changes to commit."
          else
            git commit -m "chore(data): backfill TEIAS 2026 frequency data"
            git push
          fi
