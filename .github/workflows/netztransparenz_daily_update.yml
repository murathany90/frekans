name: Netztransparenz Daily Frequency Update

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      date_from:
        description: "Backfill start date"
        required: false
        type: string
      date_to:
        description: "Backfill end date"
        required: false
        type: string
      source:
        description: "auto, api or zip"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - api
          - zip
      dry_run:
        description: "Validate without committing"
        required: false
        default: false
        type: boolean

concurrency:
  group: netztransparenz-frequency-update
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: read

env:
  NETZTRANSPARENZ_CLIENT_ID: ${{ secrets.NETZTRANSPARENZ_CLIENT_ID }}
  NETZTRANSPARENZ_CLIENT_SECRET: ${{ secrets.NETZTRANSPARENZ_CLIENT_SECRET }}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        id: deps
        run: python -m pip install -r scripts/requirements.txt

      - name: Verify secret names and environment
        id: secrets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          secret_names="$(gh secret list --repo "$GITHUB_REPOSITORY" 2>/dev/null | awk '{print $1}' || true)"
          for required in NETZTRANSPARENZ_CLIENT_ID NETZTRANSPARENZ_CLIENT_SECRET; do
            if ! printf '%s\n' "$secret_names" | grep -qx "$required"; then
              echo "Secret name not visible via gh secret list: $required"
            fi
          done
          missing=()
          [ -z "${NETZTRANSPARENZ_CLIENT_ID:-}" ] && missing+=(NETZTRANSPARENZ_CLIENT_ID)
          [ -z "${NETZTRANSPARENZ_CLIENT_SECRET:-}" ] && missing+=(NETZTRANSPARENZ_CLIENT_SECRET)
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required secret value for: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Verify API configuration
        id: config
        run: python -m json.tool config/netztransparenz.json > /dev/null

      - name: OAuth token check
        id: oauth
        run: python scripts/netztransparenz_client.py --check

      - name: Fetch and normalize Netztransparenz data
        id: fetch
        run: |
          set -euo pipefail
          args=()
          if [ -n "${{ github.event.inputs.date_from }}" ]; then args+=(--from "${{ github.event.inputs.date_from }}"); fi
          if [ -n "${{ github.event.inputs.date_to }}" ]; then args+=(--to "${{ github.event.inputs.date_to }}"); fi
          source_input="${{ github.event.inputs.source }}"
          source_input="${source_input:-auto}"
          dry_run="${{ github.event.inputs.dry_run }}"
          dry_run="${dry_run:-false}"
          if [ "$dry_run" = "true" ]; then args+=(--dry-run); fi
          python scripts/fetch_netztransparenz.py "${args[@]}" --source "$source_input" --fill-missing

      - name: Validate data
        id: validate
        run: python scripts/validate_frequency.py

      - name: Run tests
        id: tests
        run: |
          python -m pytest tests
          node tests/frontend_static_smoke.mjs
          node tests/frontend_prompt2_static.mjs
          node tests/frontend_prompt3_static.mjs
          node tests/frontend_netztransparenz_status_static.mjs
          node tests/readme_documentation_static.mjs
          node tests/workflow_static_smoke.mjs
          node tests/netztransparenz_workflow_static.mjs
          node tests/synthetic_signal_analysis.mjs
          node tests/spectral_methods.mjs

      - name: Build site
        id: build
        run: python scripts/build_site.py

      - name: Secret scan
        id: secret_scan
        run: |
          # Retry-After handling is implemented in scripts/netztransparenz_client.py.
          python - <<'PY'
          from pathlib import Path
          import re
          allow = {"runtime-token", "client-secret", "client-id", "NETZTRANSPARENZ_CLIENT_SECRET"}
          checks = {
              "ntp_token": re.compile(r"ntp_[A-Za-z0-9_=-]{8,}"),
              "client_secret_literal": re.compile(r"client_secret[\"']?\s*[:=]\s*[\"']([^\"']{8,})[\"']", re.I),
              "access_token_literal": re.compile(r"access_token[\"']?\s*[:=]\s*[\"']([^\"']{8,})[\"']", re.I),
              "bearer_literal": re.compile(r"Authorization:\s*Bearer\s+[A-Za-z0-9._~+/=-]+", re.I),
              "secret_env_assignment": re.compile(r"(?m)^NETZTRANSPARENZ_CLIENT_SECRET=\S+"),
          }
          findings = []
          for path in Path(".").rglob("*"):
              if not path.is_file() or ".git" in path.parts:
                  continue
              if path.name.startswith("prompt") and path.suffix == ".md":
                  continue
              if path.suffix == ".i16" or path.parts[:2] == ("docs", "Netztransparenz_frekans_aylık"):
                  continue
              text = path.read_text(encoding="utf-8", errors="ignore")
              for name, pattern in checks.items():
                  for match in pattern.finditer(text):
                      value = match.group(1) if match.groups() else match.group(0)
                      if value in allow:
                          continue
                      findings.append((path.as_posix(), name))
          if findings:
              for file_name, check_name in findings:
                  print(f"Secret scan match: {file_name} ({check_name})")
              raise SystemExit(1)
          print("Secret scan ok.")
          PY

      - name: Commit data changes
        if: success() && github.event.inputs.dry_run != 'true'
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            last_date="$(python - <<'PY'
          import json
          status = json.load(open("data/status.json", encoding="utf-8"))
          print(status.get("netztransparenz", {}).get("lastSuccessfulDataDate") or "unknown")
          PY
          )"
            git commit -m "data: update Netztransparenz frequency through ${last_date}"
            git push
          fi

      - name: Comment or open issue on failure
        if: failure()
        env:
          ISSUE_LABEL: automation/netztransparenz-update
          ISSUE_TITLE: Netztransparenz frekans veri güncelleme sorunu
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const title = process.env.ISSUE_TITLE;
            const label = process.env.ISSUE_LABEL;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            try {
              await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: "5319e7",
                description: "Netztransparenz automatic update alerts",
              });
            }
            let status = {};
            try {
              status = JSON.parse(fs.readFileSync("data/status.json", "utf8"));
            } catch {}
            const netz = status.netztransparenz || {};
            if (netz.status === "not_yet_published" || netz.lastError?.category === "not_yet_published") return;
            const error = netz.lastError || {};
            const body = [
              `Run time: ${netz.lastRunAt || new Date().toISOString()}`,
              `Error category: ${error.category || netz.status || "failed"}`,
              `Error step: ${error.step || "Netztransparenz daily update"}`,
              `HTTP status: ${error.httpStatus ?? "none"}`,
              `Requested date: ${netz.lastAttemptedDataDate || "unknown"}`,
              `Safe summary: ${error.message || "Workflow failed."}`,
              `Workflow run: ${runUrl}`,
            ].join("\n");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
              per_page: 100,
            });
            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, labels: [label], body });
            }

      - name: Close issue on recovery
        if: success()
        env:
          ISSUE_LABEL: automation/netztransparenz-update
          ISSUE_TITLE: Netztransparenz frekans veri güncelleme sorunu
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const title = process.env.ISSUE_TITLE;
            const label = process.env.ISSUE_LABEL;
            try {
              await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label });
            } catch (error) {
              if (error.status === 404) return;
              throw error;
            }
            let status = {};
            try {
              status = JSON.parse(fs.readFileSync("data/status.json", "utf8"));
            } catch {}
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
              per_page: 100,
            });
            const existing = issues.find(issue => issue.title === title);
            if (!existing) return;
            const netz = status.netztransparenz || {};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: [
                "Netztransparenz update recovered.",
                `Successful data date: ${netz.lastSuccessfulDataDate || "unknown"}`,
                `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join("\n"),
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: "closed",
            });
