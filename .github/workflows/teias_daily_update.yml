name: TEIAS Daily Frequency Update

on:
  schedule:
    - cron: "17 4,8,12,16 * * *"
  workflow_dispatch:

concurrency:
  group: teias-frequency-daily-update
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        id: deps
        run: python -m pip install -r scripts/requirements.txt

      - name: Fetch last 14 TEIAS days
        id: fetch
        run: python scripts/fetch_teias.py --lookback-days 14

      - name: Rebuild manifest
        id: manifest
        run: python scripts/build_daily_files.py

      - name: Validate data
        id: validate
        run: python scripts/validate_frequency.py

      - name: Run tests
        id: tests
        run: |
          python -m pytest tests
          node tests/frontend_static_smoke.mjs
          node tests/frontend_prompt2_static.mjs
          node tests/frontend_prompt3_static.mjs
          node tests/synthetic_signal_analysis.mjs
          node tests/spectral_methods.mjs

      - name: Commit data changes
        if: success()
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): automatic TEIAS frequency update"
            git push
          fi

      - name: Record failed status
        if: failure()
        run: |
          FAILED_STEP="TEIAS daily update"
          if [ "${{ steps.deps.outcome }}" != "success" ]; then FAILED_STEP="Install Python dependencies"; fi
          if [ "${{ steps.fetch.outcome }}" != "success" ]; then FAILED_STEP="Fetch last 14 TEIAS days"; fi
          if [ "${{ steps.manifest.outcome }}" != "success" ]; then FAILED_STEP="Rebuild manifest"; fi
          if [ "${{ steps.validate.outcome }}" != "success" ]; then FAILED_STEP="Validate data"; fi
          if [ "${{ steps.tests.outcome }}" != "success" ]; then FAILED_STEP="Run tests"; fi
          python scripts/write_teias_status.py \
            --result failed \
            --step "$FAILED_STEP" \
            --message "$FAILED_STEP failed. See workflow run." \
            --attempted-date "$(date -u +%F)" \
            --retry-count 3

      - name: Commit failed status
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/status.json
          git commit -m "chore(data): record failed TEIAS update" || true
          git push || true

      - name: Comment or open issue on failure
        if: failure()
        env:
          ISSUE_LABEL: automation/teias-update
          ISSUE_TITLE: TEİAŞ veri güncelleme sorunu
          FETCH_OUTCOME: ${{ steps.fetch.outcome }}
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const title = process.env.ISSUE_TITLE;
            const label = process.env.ISSUE_LABEL;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: "b60205",
                description: "TEİAŞ otomatik veri güncelleme uyarıları",
              });
            }
            let status = {};
            try {
              status = JSON.parse(fs.readFileSync("data/status.json", "utf8"));
            } catch {}
            const failedStep = [
              ["Fetch last 14 TEIAS days", process.env.FETCH_OUTCOME],
              ["Rebuild manifest", process.env.MANIFEST_OUTCOME],
              ["Validate data", process.env.VALIDATE_OUTCOME],
              ["Run tests", process.env.TESTS_OUTCOME],
            ].find(([, outcome]) => outcome && outcome !== "success")?.[0] || status.lastError?.step || "TEIAS daily update";
            const error = status.lastError || {};
            const body = [
              `Workflow çalışma zamanı: ${status.lastRunAt || new Date().toISOString()}`,
              `Hata veren adım: ${failedStep}`,
              `Güncellenmeye çalışılan tarih: ${status.lastAttemptedDataDate || "bilinmiyor"}`,
              `HTTP hata kodu: ${error.httpStatus ?? "yok"}`,
              `Parser hata mesajı: ${error.message || "Workflow başarısız oldu."}`,
              `Retry sayısı: ${error.retryCount ?? 3}`,
              `Workflow run: ${runUrl}`,
            ].join("\n");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
              per_page: 100,
            });
            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: [label],
                body,
              });
            }

      - name: Close issue on recovery
        if: success()
        env:
          ISSUE_LABEL: automation/teias-update
          ISSUE_TITLE: TEİAŞ veri güncelleme sorunu
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const title = process.env.ISSUE_TITLE;
            const label = process.env.ISSUE_LABEL;
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (error) {
              if (error.status === 404) return;
              throw error;
            }
            let status = {};
            try {
              status = JSON.parse(fs.readFileSync("data/status.json", "utf8"));
            } catch {}
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
              per_page: 100,
            });
            const existing = issues.find(issue => issue.title === title);
            if (!existing) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: [
                "Güncelleme tekrar başarılı oldu.",
                `Başarılı son tarih: ${status.lastSuccessfulDataDate || status.lastSuccessfulTeiasDataDate || "bilinmiyor"}`,
                `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join("\n"),
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: "closed",
            });
