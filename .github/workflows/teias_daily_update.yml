name: TEIAS Daily Frequency Update

on:
  schedule:
    - cron: "17 4,8,12,16 * * *"
  workflow_dispatch:

concurrency:
  group: teias-frequency-daily-update
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Fetch last 14 TEIAS days
        run: python scripts/fetch_teias.py --lookback-days 14

      - name: Rebuild manifest
        run: python scripts/build_daily_files.py

      - name: Validate data
        run: python scripts/validate_frequency.py

      - name: Run tests
        run: |
          python -m pytest tests
          node tests/frontend_static_smoke.mjs

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): automatic TEIAS frequency update"
            git push
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `TEIAS daily update failed: ${new Date().toISOString()}`,
              body: `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
